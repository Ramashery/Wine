<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | VinoElite</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ asset_path }}css/style.css">
    <style>
        .error-404-page { min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .error-404-page .code { font-size: 6rem; font-weight: 300; letter-spacing: 4px; color: var(--primary-light, #c19a6b); line-height: 1; }
        .error-404-page h1 { margin: 10px 0 20px; font-weight: 300; }
        .error-404-page p { color: var(--text-muted, #b0b0b0); margin-bottom: 30px; }
        .error-404-page .lang-links { margin-top: 20px; display: flex; gap: 12px; justify-content: center; }
        .error-404-page .lang-links a { color: var(--text-muted, #b0b0b0); text-decoration: none; font-size: 0.85rem; }
        .error-404-page .lang-links a:hover { color: var(--primary-light, #c19a6b); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="/en/index.html" class="logo">Vino<span>Elite</span></a>
            </div>
        </div>
    </header>

    <section class="error-404-page">
        <div class="container">
            <div class="code">404</div>
            <h1>Page Not Found</h1>
            <p>The page you're looking for doesn't exist or has moved.</p>
            <a href="/en/index.html" class="btn-primary"><i class="fas fa-wine-bottle"></i> Back to VinoElite</a>
            <div class="lang-links">
                <a href="/en/catalog.html">EN Catalog</a>
                <a href="/ru/catalog.html">RU Каталог</a>
                <a href="/ka/catalog.html">KA კატალოგი</a>
            </div>
        </div>
    </section>
</body>
</html>
