<header>
    <div class="container">
        <div class="header-content">
            <a href="{{ url_for('index', lang) }}" class="logo">Vino<span>Elite</span></a>
            <nav class="nav-links" id="main-nav">
                <a href="{{ url_for('index', lang) }}"{% if active_page == 'index' %} class="active"{% endif %}>Home</a>
                <a href="{{ url_for('catalog', lang) }}"{% if active_page == 'catalog' %} class="active"{% endif %}>Catalog</a>
                <a href="#">Collections</a>
                <a href="#">Wineries</a>
                <a href="#">About Us</a>
                <div class="mobile-actions">
                    <div class="mobile-search">
                        <form class="search-box">
                            <input type="text" placeholder="Search wines...">
                            <button type="submit" aria-label="Search"><i class="fas fa-search"></i></button>
                        </form>
                    </div>
                    <a href="{{ url_for('profile', lang) }}" class="mobile-action-btn" id="mobile-auth-button">
                        <i class="far fa-user"></i>
                        <span>Sign In</span>
                    </a>
                    <a href="{{ url_for('cart', lang) }}" class="mobile-action-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Shopping Cart</span>
                        <span class="cart-count">0</span>
                    </a>
                    <a href="{{ url_for('profile', lang) }}#wishlist" class="mobile-action-btn">
                        <i class="far fa-heart"></i>
                        <span>Wishlist</span>
                        <span class="wishlist-count">0</span>
                    </a>
                    <div class="lang-switcher mobile-lang-switcher">
                        {% for code, label in languages.items() %}
                        <a href="{{ alt_urls[code] }}" class="lang-link{% if code == lang %} active{% endif %}">{{ label }}</a>
                        {% endfor %}
                    </div>
                </div>
            </nav>
            <div class="header-actions">
                <button class="search-btn desktop-only" title="Search" aria-label="Search"><i class="fas fa-search"></i></button>
                <a href="{{ url_for('profile', lang) }}#wishlist" class="wishlist-btn desktop-only" title="Wishlist" aria-label="Wishlist"><i class="far fa-heart"></i><span class="wishlist-count-badge">0</span></a>
                <a href="{{ url_for('profile', lang) }}" class="auth-btn desktop-only" id="auth-button" title="Sign In"><i class="far fa-user"></i><span class="auth-text">Sign In</span></a>
                <a href="{{ url_for('cart', lang) }}" class="cart-btn desktop-only" title="Shopping Cart" aria-label="Shopping Cart"><i class="fas fa-shopping-cart"></i><span class="cart-count-badge">0</span></a>
                <div class="lang-switcher desktop-only">
                    {% for code, label in languages.items() %}
                    <a href="{{ alt_urls[code] }}" class="lang-link{% if code == lang %} active{% endif %}">{{ label }}</a>
                    {% endfor %}
                </div>
            </div>
            <button class="mobile-menu-btn" aria-label="Menu"><i class="fas fa-bars"></i></button>
        </div>
    </div>
</header>
