name: Build and deploy VinoElite

on:
  push:
    branches: [main]
    paths:
      - "templates/**"
      - "locales/**"
      - "assets/**"
      - "generate_site.py"
      - "admin.html"
      - ".github/workflows/build-and-deploy.yml"
  schedule:
    # Rebuild once a day so catalog/price changes made in admin.html show
    # up on the site even without a code push.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Firebase service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > /tmp/service-account.json

      - name: Validate service account key is valid JSON
        run: python3 -c "import json; json.load(open('/tmp/service-account.json')); print('service account JSON looks valid')"

      - name: Build site
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          python3 generate_site.py \
            --service-account /tmp/service-account.json \
            --out docs \
            --site-url "${SITE_URL}"

      - name: Remove service account key
        if: always()
        run: rm -f /tmp/service-account.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# ---------------------------------------------------------------------------
# One-time setup:
#   1. Firebase Console → Project settings → Service accounts →
#      "Generate new private key" → copy the full JSON.
#   2. Repo → Settings → Secrets and variables → Actions → New repository
#      secret → name it FIREBASE_SERVICE_ACCOUNT, paste the JSON as the value.
#      IMPORTANT (mobile users): open the downloaded .json file in Chrome
#      (not Notes/text-editor apps) before copying it, so smart-quotes
#      autocorrect doesn't mangle the " characters.
#   3. Repo → Settings → Secrets and variables → Actions → Variables tab →
#      New variable → name it SITE_URL → value e.g. https://vinoelite.com
#      (or https://<user>.github.io/<repo> if you don't have a custom domain).
#   4. Repo → Settings → Pages → Source: "GitHub Actions".
# After that, every push to templates/locales/assets/generate_site.py
# rebuilds and redeploys automatically — and it also self-heals once a day
# in case someone edited the catalog in admin.html without touching code.
# ---------------------------------------------------------------------------
